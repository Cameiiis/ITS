<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITS Database Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d47;
    --accent: #3b82f6;
    --accent2: #60a5fa;
    --accent-glow: rgba(59,130,246,0.15);
    --correct: #10b981;
    --correct-bg: rgba(16,185,129,0.1);
    --wrong: #ef4444;
    --wrong-bg: rgba(239,68,68,0.1);
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --yellow: #f59e0b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }

  /* ── HEADER ── */
  .header {
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
    background: rgba(10,14,26,0.8);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .logo-sub {
    font-size: 11px;
    color: var(--text3);
    font-weight: 400;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .progress-info {
    text-align: right;
  }

  .progress-label {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .progress-count {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent2);
    font-family: 'JetBrains Mono', monospace;
    line-height: 1;
    margin-top: 2px;
  }

  .progress-bar-wrap {
    width: 200px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 6px;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #8b5cf6);
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* ── MAIN CONTENT ── */
  .main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .card {
    width: 100%;
    max-width: 760px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(59,130,246,0.05);
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    background: var(--surface2);
    padding: 20px 28px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }

  .q-badge {
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 6px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .q-type-badge {
    font-size: 11px;
    color: var(--text3);
    background: var(--border);
    padding: 3px 9px;
    border-radius: 4px;
    font-weight: 500;
  }

  .multi-badge {
    font-size: 11px;
    color: var(--yellow);
    background: rgba(245,158,11,0.1);
    border: 1px solid rgba(245,158,11,0.3);
    padding: 3px 9px;
    border-radius: 4px;
    font-weight: 500;
  }

  .card-body {
    padding: 28px;
  }

  .question-text {
    font-size: 16px;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 28px;
    font-weight: 400;
  }

  .question-text code {
    font-family: 'JetBrains Mono', monospace;
    background: var(--surface2);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
    color: var(--accent2);
  }

  .options-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option-btn {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    text-align: left;
    transition: all 0.15s ease;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    line-height: 1.5;
  }

  .option-btn:hover:not([disabled]) {
    border-color: var(--accent);
    background: var(--accent-glow);
    transform: translateX(3px);
  }

  .option-btn.selected {
    border-color: var(--accent);
    background: var(--accent-glow);
  }

  .option-btn.correct {
    border-color: var(--correct);
    background: var(--correct-bg);
    color: #6ee7b7;
  }

  .option-btn.wrong {
    border-color: var(--wrong);
    background: var(--wrong-bg);
    color: #fca5a5;
  }

  .option-btn.reveal-correct {
    border-color: var(--correct);
    background: var(--correct-bg);
    color: #6ee7b7;
    opacity: 0.7;
  }

  .option-marker {
    width: 26px;
    height: 26px;
    border-radius: 6px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
    color: var(--text3);
    font-family: 'JetBrains Mono', monospace;
    transition: all 0.15s;
  }

  .option-btn.selected .option-marker,
  .option-btn.correct .option-marker,
  .option-btn.wrong .option-marker {
    color: white;
  }

  .option-btn.correct .option-marker { background: var(--correct); border-color: var(--correct); }
  .option-btn.wrong .option-marker { background: var(--wrong); border-color: var(--wrong); }
  .option-btn.selected .option-marker { background: var(--accent); border-color: var(--accent); }
  .option-btn.reveal-correct .option-marker { background: var(--correct); border-color: var(--correct); color: white; }

  .option-text {
    flex: 1;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  /* Long code options */
  .option-btn.code-option .option-text {
    white-space: pre-wrap;
    font-size: 12px;
    line-height: 1.6;
  }

  .feedback-msg {
    margin-top: 16px;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .feedback-msg.correct { background: var(--correct-bg); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }
  .feedback-msg.wrong { background: var(--wrong-bg); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }

  .feedback-icon { font-size: 18px; flex-shrink: 0; }

  /* Underlined term highlighting for "evaluate underlined text" questions */
  u.eval-underline {
    text-decoration: underline;
    text-decoration-color: #a78bfa;
    text-decoration-thickness: 2px;
    color: #c4b5fd;
    font-weight: 600;
    font-style: normal;
  }

  /* Instructions sub-block for evaluate underlined text questions */
  .eval-instructions {
    margin-top: 14px;
    padding: 10px 14px;
    background: rgba(99, 102, 241, 0.08);
    border-left: 3px solid rgba(99, 102, 241, 0.4);
    border-radius: 0 8px 8px 0;
    font-size: 14px;
    color: var(--text2);
    line-height: 1.6;
  }

  /* Image-based options notice */
  .image-notice {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 16px;
    margin-bottom: 12px;
    background: rgba(251, 191, 36, 0.08);
    border: 1px solid rgba(251, 191, 36, 0.25);
    border-radius: 10px;
    font-size: 13px;
    color: #fde68a;
    line-height: 1.5;
  }
  .image-notice span:first-child { flex-shrink: 0; font-size: 16px; }

  /* ============================================
     MATCHING QUESTION STYLES
     ============================================ */

  .match-table {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
  }

  .match-row {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 16px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  .match-statement {
    font-size: 15px;
    color: var(--text1);
    line-height: 1.6;
    flex: 1;
  }

  .match-choices {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
  }

  .match-choices-col {
    flex-direction: column;
    margin-top: 8px;
  }

  .match-choice-btn {
    padding: 8px 18px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: rgba(255,255,255,0.05);
    color: var(--text1);
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .match-choice-btn:hover { background: rgba(99,102,241,0.15); border-color: rgba(99,102,241,0.4); }
  .match-choice-btn.match-selected { background: rgba(99,102,241,0.25); border-color: #818cf8; color: #c7d2fe; font-weight: 600; }
  .match-choice-btn.match-correct { background: rgba(16,185,129,0.2); border-color: rgba(16,185,129,0.5); color: #6ee7b7; }
  .match-choice-btn.match-wrong { background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.4); color: #fca5a5; }
  .match-choice-btn.match-reveal { background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.3); color: #6ee7b7; opacity: 0.7; }
  .match-choice-btn:disabled { cursor: default; }

  .match-label-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: rgba(99,102,241,0.2);
    color: #a5b4fc;
    font-weight: 700;
    font-size: 13px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  /* Drag-and-drop styles */
  .drag-drop-wrapper {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    width: 100%;
  }

  @media (max-width: 640px) {
    .drag-drop-wrapper { grid-template-columns: 1fr; }
  }

  .drag-bank {
    background: rgba(99,102,241,0.06);
    border: 1.5px dashed rgba(99,102,241,0.3);
    border-radius: 12px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 120px;
  }

  .drag-bank-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }

  .drag-chip {
    padding: 10px 14px;
    background: rgba(99,102,241,0.15);
    border: 1.5px solid rgba(99,102,241,0.35);
    border-radius: 8px;
    color: #c7d2fe;
    font-size: 13px;
    cursor: grab;
    transition: all 0.15s;
    user-select: none;
  }
  .drag-chip:hover { background: rgba(99,102,241,0.25); transform: translateY(-1px); }
  .drag-chip.dragging { opacity: 0.5; cursor: grabbing; }
  .drag-chip.chip-active { border-color: #818cf8; box-shadow: 0 0 0 2px rgba(99,102,241,0.3); }

  .drag-zones {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .drag-zone {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .drag-zone-statement {
    font-size: 14px;
    color: var(--text1);
    line-height: 1.5;
  }

  .drag-drop-area {
    min-height: 46px;
    border: 2px dashed rgba(255,255,255,0.15);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    padding: 8px 12px;
    transition: all 0.15s;
    background: rgba(255,255,255,0.02);
  }
  .drag-drop-area.drag-over { border-color: #818cf8; background: rgba(99,102,241,0.1); }
  .drag-drop-area.drop-correct { border-color: rgba(16,185,129,0.4); background: rgba(16,185,129,0.07); }
  .drag-drop-area.drop-wrong { border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.07); }

  .drop-placeholder {
    color: var(--text3);
    font-size: 13px;
    font-style: italic;
  }

  .drop-chip {
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
  }
  .chip-placed { background: rgba(99,102,241,0.2); color: #c7d2fe; border: 1px solid rgba(99,102,241,0.4); }
  .chip-correct { background: rgba(16,185,129,0.2); color: #6ee7b7; }
  .chip-wrong { background: rgba(239,68,68,0.2); color: #fca5a5; }

  .match-correct-text { color: #6ee7b7; font-weight: 600; }
  .match-wrong-text { color: #fca5a5; font-weight: 600; }

  /* Question text with bullet points (context questions) */
  #question-text { white-space: normal; line-height: 1.7; }

  /* Code blocks embedded in question text */
  pre.q-code-block {
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.08);
    border-left: 3px solid rgba(99,102,241,0.5);
    border-radius: 8px;
    padding: 12px 16px;
    margin: 12px 0;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 13px;
    color: #e2e8f0;
    overflow-x: auto;
    white-space: pre;
    line-height: 1.6;
  }

  .card-footer {
    padding: 20px 28px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    color: var(--text2);
    font-family: inherit;
    transition: all 0.15s;
    text-decoration: none;
  }

  .nav-btn:hover:not([disabled]) {
    border-color: var(--accent);
    color: var(--accent2);
    background: var(--accent-glow);
  }

  .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    border-color: transparent;
    color: white;
  }

  .btn-primary:hover:not([disabled]) {
    background: linear-gradient(135deg, #2563eb, #7c3aed);
    border-color: transparent;
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(59,130,246,0.3);
  }

  .btn-finish {
    background: linear-gradient(135deg, var(--correct), #059669);
    border-color: transparent;
    color: white;
  }

  .btn-finish:hover:not([disabled]) {
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(16,185,129,0.3);
  }

  .center-footer { margin: 0 auto; }

  /* ── MINI MAP ── */
  .mini-map {
    max-width: 760px;
    margin: 0 auto 16px;
    padding: 0 20px;
  }

  .mini-map-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text3);
    margin-bottom: 8px;
  }

  .mini-map-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .mini-dot {
    width: 20px;
    height: 20px;
    border-radius: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.1s;
    font-size: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: transparent;
  }

  .mini-dot.answered-correct { background: rgba(16,185,129,0.4); border-color: var(--correct); }
  .mini-dot.answered-wrong { background: rgba(239,68,68,0.4); border-color: var(--wrong); }
  .mini-dot.answered-skipped { background: rgba(245,158,11,0.2); border-color: var(--yellow); }
  .mini-dot.current { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }

  .mini-dot:hover { transform: scale(1.2); }

  /* ── RESULTS ── */
  #results-screen {
    display: none;
    width: 100%;
    max-width: 900px;
    padding: 20px;
    margin: 0 auto;
    animation: slideUp 0.4s ease;
  }

  .result-hero {
    text-align: center;
    padding: 40px 20px 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }

  .result-hero::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%; transform: translateX(-50%);
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(59,130,246,0.15), transparent 70%);
    pointer-events: none;
  }

  .result-grade {
    font-size: 96px;
    font-weight: 700;
    line-height: 1;
    font-family: 'JetBrains Mono', monospace;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .result-label {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text3);
    margin-top: 4px;
    margin-bottom: 24px;
  }

  .result-stats {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .stat-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 28px;
    min-width: 120px;
  }

  .stat-val {
    font-size: 36px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    line-height: 1;
  }

  .stat-val.green { color: var(--correct); }
  .stat-val.red { color: var(--wrong); }
  .stat-val.gray { color: var(--text3); }

  .stat-lbl {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text3);
    margin-top: 4px;
  }

  /* Review section */
  .review-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .review-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }

  .filter-tabs {
    display: flex;
    gap: 8px;
  }

  .filter-tab {
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    color: var(--text3);
    font-family: inherit;
    transition: all 0.15s;
  }

  .filter-tab.active { border-color: var(--accent); background: var(--accent-glow); color: var(--accent2); }
  .filter-tab.correct-tab.active { border-color: var(--correct); background: var(--correct-bg); color: #6ee7b7; }
  .filter-tab.wrong-tab.active { border-color: var(--wrong); background: var(--wrong-bg); color: #fca5a5; }

  .review-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-height: 600px;
    overflow-y: auto;
    padding-right: 4px;
  }

  .review-list::-webkit-scrollbar { width: 4px; }
  .review-list::-webkit-scrollbar-track { background: var(--surface2); }
  .review-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .review-item {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .review-item:hover { border-color: var(--accent); }
  .review-item.ri-correct { border-color: rgba(16,185,129,0.3); }
  .review-item.ri-wrong { border-color: rgba(239,68,68,0.3); }

  .ri-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .ri-num {
    font-size: 11px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text3);
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 4px;
  }

  .ri-status {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .ri-status.correct { background: var(--correct-bg); color: #6ee7b7; }
  .ri-status.wrong { background: var(--wrong-bg); color: #fca5a5; }
  .ri-status.skipped { background: rgba(245,158,11,0.1); color: var(--yellow); }

  .ri-question {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.5;
    margin-bottom: 10px;
  }

  .ri-answers {
    display: none;
    margin-top: 10px;
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }

  .review-item.expanded .ri-answers { display: block; }

  .ri-answer-row {
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 6px;
    margin-bottom: 4px;
    font-family: 'JetBrains Mono', monospace;
  }

  .ri-answer-row.your-ans { background: var(--wrong-bg); color: #fca5a5; }
  .ri-answer-row.correct-ans { background: var(--correct-bg); color: #6ee7b7; }
  .ri-answer-row.your-correct { background: var(--correct-bg); color: #6ee7b7; }

  .ri-expand-hint {
    font-size: 11px;
    color: var(--text3);
    cursor: pointer;
  }

  .retry-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 28px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    color: white;
    font-family: inherit;
    margin: 24px auto 0;
    transition: all 0.15s;
    display: block;
  }

  .retry-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(59,130,246,0.35); }

  /* Responsive */
  @media (max-width: 600px) {
    .header { padding: 14px 16px; }
    .progress-bar-wrap { width: 120px; }
    .card-body { padding: 20px 16px; }
    .card-footer { padding: 16px; flex-wrap: wrap; }
    .result-grade { font-size: 72px; }
  }
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <header class="header">
    <div class="logo">
      <div class="logo-icon">🗄️</div>
      <div>
        <div class="logo-text">ITS Database</div>
        <div class="logo-sub">Section 1 Quiz</div>
      </div>
    </div>
    <div class="header-right">
      <button class="nav-btn btn-finish" id="finish-quiz-btn" onclick="showResults()" style="font-size:13px;padding:8px 16px;">
        🏁 Finish Quiz
      </button>
      <div class="progress-info">
        <div class="progress-label">Question</div>
        <div class="progress-count" id="hdr-progress">1 / 200</div>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" id="progress-bar" style="width:0.5%"></div>
        </div>
      </div>
    </div>
  </header>

  <!-- Quiz screen -->
  <div class="main" id="quiz-screen">
    <div style="width:100%;max-width:760px;">
      <!-- Mini map -->
      <div class="mini-map">
        <div class="mini-map-label">Progress map — click to jump</div>
        <div class="mini-map-grid" id="mini-map"></div>
      </div>
      <!-- Question card -->
      <div class="card" id="question-card">
        <div class="card-header" id="card-header">
          <span class="q-badge" id="q-badge">Q 1</span>
          <span class="q-type-badge" id="q-type-badge">Multiple Choice</span>
        </div>
        <div class="card-body">
          <div class="question-text" id="question-text"></div>
          <div class="options-list" id="options-list"></div>
          <div id="feedback-area"></div>
        </div>
        <div class="card-footer">
          <button class="nav-btn" id="prev-btn" onclick="navigate(-1)">← Prev</button>
          <button class="nav-btn btn-primary" id="check-btn" onclick="checkAnswer()" disabled>Check</button>
          <button class="nav-btn" id="next-btn" onclick="navigate(1)">Next →</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Results screen -->
  <div id="results-screen">
    <div class="result-hero">
      <div class="result-grade" id="result-score">0%</div>
      <div class="result-label">Final Score</div>
      <div class="result-stats">
        <div class="stat-box">
          <div class="stat-val green" id="stat-correct">0</div>
          <div class="stat-lbl">✓ Correct</div>
        </div>
        <div class="stat-box">
          <div class="stat-val red" id="stat-wrong">0</div>
          <div class="stat-lbl">✗ Incorrect</div>
        </div>
        <div class="stat-box">
          <div class="stat-val gray" id="stat-skipped">0</div>
          <div class="stat-lbl">— Skipped</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" style="color:var(--accent2)" id="stat-total">200</div>
          <div class="stat-lbl">Total</div>
        </div>
      </div>
    </div>

    <!-- Correct questions -->
    <div id="correct-section" style="margin-bottom:24px;">
      <div class="review-header">
        <div class="review-title">✓ Correct Answers <span id="correct-nums-summary" style="font-size:13px;color:var(--correct);font-weight:500;"></span></div>
        <div class="filter-tabs">
          <button class="filter-tab correct-tab active" onclick="setFilter('correct','all')">All</button>
        </div>
      </div>
      <div class="review-list" id="correct-list"></div>
    </div>

    <!-- Wrong questions -->
    <div id="wrong-section">
      <div class="review-header">
        <div class="review-title">✗ Incorrect / Skipped <span id="wrong-nums-summary" style="font-size:13px;color:var(--wrong);font-weight:500;"></span></div>
        <div class="filter-tabs">
          <button class="filter-tab wrong-tab active" onclick="setFilter('wrong','all')">All</button>
        </div>
      </div>
      <div class="review-list" id="wrong-list"></div>
    </div>

    <button class="retry-btn" onclick="resetQuiz()">↺ Retake Quiz</button>
  </div>
</div>

let current = 0;
let answers = {}; // {qIndex: [selectedTexts]}
let checked = {}; // {qIndex: bool isCorrect}

function init() {
  buildMiniMap();
  renderQuestion(current);
}

function buildMiniMap() {
  const grid = document.getElementById('mini-map');
  grid.innerHTML = '';
  QUESTIONS.forEach((q, i) => {
    const dot = document.createElement('div');
    dot.className = 'mini-dot';
    dot.id = `dot-${i}`;
    dot.title = `Q${q.num}`;
    dot.onclick = () => goTo(i);
    grid.appendChild(dot);
  });
}

function updateMiniMap() {
  QUESTIONS.forEach((q, i) => {
    const dot = document.getElementById(`dot-${i}`);
    if (!dot) return;
    dot.className = 'mini-dot';
    if (i === current) dot.classList.add('current');
    if (checked.hasOwnProperty(i)) {
      dot.classList.add(checked[i] ? 'answered-correct' : 'answered-wrong');
    } else {
      const hasAnswers = (q.type === 'Matching' && q.pairs)
        ? Object.keys(matchingAnswers[i] || {}).length > 0
        : (answers[i] && answers[i].length > 0);
      if (hasAnswers) dot.classList.add('answered-skipped');
    }
  });
}

function goTo(idx) {
  current = idx;
  renderQuestion(current);
}

function renderQuestion(idx) {
  const q = QUESTIONS[idx];
  
  // Update header
  document.getElementById('hdr-progress').textContent = `${idx+1} / ${QUESTIONS.length}`;
  document.getElementById('progress-bar').style.width = `${((idx+1)/QUESTIONS.length*100).toFixed(1)}%`;
  document.getElementById('q-badge').textContent = `Q ${q.num}`;
  document.getElementById('q-type-badge').textContent = q.type;
  
  // Multi badge
  const header = document.getElementById('card-header');
  const existingMulti = header.querySelector('.multi-badge');
  if (existingMulti) existingMulti.remove();
  if (q.is_multi && q.type !== 'Matching') {
    const badge = document.createElement('span');
    badge.className = 'multi-badge';
    badge.textContent = `Choose ${q.correct.length}`;
    header.appendChild(badge);
  }
  
  // Question text
  const qText = document.getElementById('question-text');
  qText.innerHTML = formatText(q.question, q.num);
  
  // Options area
  const optList = document.getElementById('options-list');
  optList.innerHTML = '';
  
  // Remove image notice if present
  const existingNotice = document.getElementById('image-notice');
  if (existingNotice) existingNotice.remove();
  
  const isChecked = checked.hasOwnProperty(idx);

  // ---- MATCHING QUESTION ----
  if (q.type === 'Matching' && q.pairs) {
    renderMatchingQuestion(idx, q, optList, isChecked);
  } else {
    // ---- STANDARD MULTIPLE CHOICE ----
    if (IMAGE_OPTION_QS.has(q.num)) {
      const notice = document.createElement('div');
      notice.id = 'image-notice';
      notice.className = 'image-notice';
      notice.innerHTML = `<span>⚠️</span> <span>This question's options contain code/images from the original exam. Options are labeled as shown. Refer to your exam materials to view the actual code.</span>`;
      optList.parentNode.insertBefore(notice, optList);
    }
    
    const savedAnswers = answers[idx] || [];
    
    q.options.forEach((opt, oi) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      
      const isCode = opt.text.length > 80 || 
                     opt.text.includes('SELECT') || opt.text.includes('CREATE') ||
                     opt.text.includes('INSERT') || opt.text.includes('BEGIN') ||
                     opt.text.includes('DELETE') || opt.text.includes('UPDATE');
      if (isCode) btn.classList.add('code-option');
      
      const labels = ['A','B','C','D','E','F','G','H'];
      const label = labels[oi] || String.fromCharCode(65+oi);
      
      const marker = document.createElement('div');
      marker.className = 'option-marker';
      marker.textContent = label;
      
      const textEl = document.createElement('span');
      textEl.className = 'option-text';
      textEl.textContent = opt.text;
      
      btn.appendChild(marker);
      btn.appendChild(textEl);
      
      const isSelected = savedAnswers.includes(opt.text);
      
      if (isChecked) {
        btn.disabled = true;
        const isCorrectOpt = q.correct.some(c => c.toLowerCase().trim() === opt.text.toLowerCase().trim());
        if (isSelected && isCorrectOpt) btn.classList.add('correct');
        else if (isSelected && !isCorrectOpt) btn.classList.add('wrong');
        else if (!isSelected && isCorrectOpt) btn.classList.add('reveal-correct');
      } else {
        if (isSelected) btn.classList.add('selected');
        btn.onclick = () => toggleOption(idx, opt.text, btn, q.is_multi);
      }
      
      optList.appendChild(btn);
    });
  }
  
  // Feedback area
  const fb = document.getElementById('feedback-area');
  fb.innerHTML = '';
  if (isChecked) {
    const isCorrect = checked[idx];
    const div = document.createElement('div');
    div.className = `feedback-msg ${isCorrect ? 'correct' : 'wrong'}`;
    if (isCorrect) {
      div.innerHTML = `<span class="feedback-icon">✓</span><div><strong>Correct!</strong></div>`;
    } else {
      const correctAnswers = q.pairs 
        ? q.pairs.map(p => `${p.label}: ${p.answer}`).join(', ')
        : q.correct.join(', ');
      div.innerHTML = `<span class="feedback-icon">✗</span>
        <div><strong>Incorrect.</strong><br>Correct: <em>${correctAnswers}</em></div>`;
    }
    fb.appendChild(div);
  }
  
  // Buttons
  document.getElementById('prev-btn').disabled = idx === 0;
  const nextBtn = document.getElementById('next-btn');
  const checkBtn = document.getElementById('check-btn');
  
  if (idx === QUESTIONS.length - 1 && isChecked) {
    nextBtn.textContent = '🏁 Finish';
    nextBtn.className = 'nav-btn btn-finish';
    nextBtn.onclick = showResults;
    nextBtn.disabled = false;
  } else if (idx === QUESTIONS.length - 1) {
    nextBtn.textContent = 'Next →';
    nextBtn.className = 'nav-btn';
    nextBtn.onclick = () => navigate(1);
    nextBtn.disabled = true;
  } else {
    nextBtn.textContent = 'Next →';
    nextBtn.className = 'nav-btn';
    nextBtn.onclick = () => navigate(1);
    nextBtn.disabled = false;
  }
  
  const savedLen = q.type === 'Matching' && q.pairs
    ? Object.values(matchingAnswers[idx] || {}).filter(v => v !== null && v !== undefined).length
    : (answers[idx] || []).length;
  
  if (isChecked) {
    checkBtn.disabled = true;
    checkBtn.textContent = '✓ Checked';
  } else {
    checkBtn.disabled = (savedLen === 0);
    checkBtn.textContent = 'Check';
    checkBtn.onclick = checkAnswer;
  }
  
  updateMiniMap();
  updateFinishBtn();
}

// ============================================================
// MATCHING QUESTION RENDERING
// ============================================================

// Separate state store for matching answers: {qIdx: {pairLabel: chosenAnswer}}
const matchingAnswers = {};

function renderMatchingQuestion(idx, q, container, isChecked) {
  const saved = matchingAnswers[idx] || {};
  const matchType = q.match_type;

  if (matchType === 'yes_no') {
    // Yes/No toggle for each statement
    const table = document.createElement('div');
    table.className = 'match-table';

    q.pairs.forEach(pair => {
      const row = document.createElement('div');
      row.className = 'match-row';
      
      const stmt = document.createElement('div');
      stmt.className = 'match-statement';
      stmt.textContent = pair.statement;
      
      const btns = document.createElement('div');
      btns.className = 'match-choices';
      
      q.choices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = 'match-choice-btn';
        btn.textContent = choice;
        
        const isSelected = saved[pair.label] === choice;
        const isCorrect = pair.answer.toLowerCase() === choice.toLowerCase();
        
        if (isChecked) {
          btn.disabled = true;
          if (isSelected && isCorrect) btn.classList.add('match-correct');
          else if (isSelected && !isCorrect) btn.classList.add('match-wrong');
          else if (!isSelected && isCorrect) btn.classList.add('match-reveal');
        } else {
          if (isSelected) btn.classList.add('match-selected');
          btn.onclick = () => selectMatchChoice(idx, pair.label, choice, btns);
        }
        
        btns.appendChild(btn);
      });
      
      row.appendChild(stmt);
      row.appendChild(btns);
      table.appendChild(row);
    });
    
    container.appendChild(table);

  } else if (matchType === 'select') {
    // Dropdown selects for fill-in-the-blank
    const table = document.createElement('div');
    table.className = 'match-table';

    q.pairs.forEach(pair => {
      const row = document.createElement('div');
      row.className = 'match-row';
      
      const stmt = document.createElement('div');
      stmt.className = 'match-statement';
      
      // Replace [answer choice] with a select or the answer
      const labelBadge = document.createElement('span');
      labelBadge.className = 'match-label-badge';
      labelBadge.textContent = pair.label;
      
      if (isChecked) {
        const chosen = saved[pair.label];
        const isCorrect = chosen && chosen.toLowerCase() === pair.answer.toLowerCase();
        const ansSpan = document.createElement('span');
        ansSpan.className = `match-answer-shown ${isCorrect ? 'match-correct-text' : 'match-wrong-text'}`;
        ansSpan.textContent = chosen || '(not answered)';
        
        const text = pair.statement.replace('[answer choice]', '___');
        stmt.innerHTML = text;
        stmt.appendChild(document.createElement('br'));
        const correctHint = document.createElement('span');
        correctHint.style.cssText = 'font-size:13px; color: var(--text3); margin-top: 4px; display: block;';
        correctHint.textContent = isCorrect ? '✓ ' + chosen : `✗ You chose: ${chosen || 'nothing'} → Correct: ${pair.answer}`;
        correctHint.style.color = isCorrect ? '#6ee7b7' : '#fca5a5';
        stmt.appendChild(correctHint);
      } else {
        stmt.textContent = pair.statement.replace('[answer choice]', '[ ? ]');
      }
      
      const choicesDiv = document.createElement('div');
      choicesDiv.className = 'match-choices match-choices-col';
      
      if (!isChecked) {
        q.choices.forEach(choice => {
          const btn = document.createElement('button');
          btn.className = 'match-choice-btn';
          btn.textContent = choice;
          const isSelected = saved[pair.label] === choice;
          if (isSelected) btn.classList.add('match-selected');
          btn.onclick = () => selectMatchChoice(idx, pair.label, choice, choicesDiv);
          choicesDiv.appendChild(btn);
        });
      }
      
      const leftCol = document.createElement('div');
      leftCol.style.cssText = 'display: flex; align-items: flex-start; gap: 10px; flex: 1;';
      leftCol.appendChild(labelBadge);
      leftCol.appendChild(stmt);
      
      row.appendChild(leftCol);
      if (!isChecked) row.appendChild(choicesDiv);
      table.appendChild(row);
    });
    
    container.appendChild(table);

  } else if (matchType === 'drag_drop') {
    // Drag and drop matching
    renderDragDrop(idx, q, container, isChecked, saved);
  }
}

function selectMatchChoice(idx, pairLabel, choice, btnsContainer) {
  if (!matchingAnswers[idx]) matchingAnswers[idx] = {};
  matchingAnswers[idx][pairLabel] = choice;
  
  // Update UI within this pair's button group
  btnsContainer.querySelectorAll('.match-choice-btn').forEach(b => {
    b.classList.remove('match-selected');
    if (b.textContent === choice) b.classList.add('match-selected');
  });
  
  // Enable check button if all pairs answered
  const q = QUESTIONS[current];
  const answered = Object.keys(matchingAnswers[idx] || {}).length;
  const checkBtn = document.getElementById('check-btn');
  checkBtn.disabled = answered === 0;
}

function renderDragDrop(idx, q, container, isChecked, saved) {
  const wrapper = document.createElement('div');
  wrapper.className = 'drag-drop-wrapper';

  // Left: available choices (bank)
  const bank = document.createElement('div');
  bank.className = 'drag-bank';
  bank.innerHTML = '<div class="drag-bank-title">📦 Available choices</div>';
  
  // Right: drop zones (statements)
  const zones = document.createElement('div');
  zones.className = 'drag-zones';

  // Track which choices are already used
  const usedChoices = new Set(Object.values(saved));

  if (!isChecked) {
    // Build draggable chips in bank
    q.choices.forEach(choice => {
      if (!usedChoices.has(choice)) {
        const chip = createDragChip(choice, idx, q);
        bank.appendChild(chip);
      }
    });
  }

  // Build drop zones for each pair/statement
  q.pairs.forEach(pair => {
    const zone = document.createElement('div');
    zone.className = 'drag-zone';
    
    const labelBadge = document.createElement('span');
    labelBadge.className = 'match-label-badge';
    labelBadge.textContent = pair.label;
    
    const stmtEl = document.createElement('div');
    stmtEl.className = 'drag-zone-statement';
    stmtEl.textContent = pair.statement;
    
    const dropArea = document.createElement('div');
    dropArea.className = 'drag-drop-area';
    dropArea.dataset.label = pair.label;
    
    const chosenAnswer = saved[pair.label];
    
    if (isChecked) {
      const isCorrect = chosenAnswer && chosenAnswer.toLowerCase() === pair.answer.toLowerCase();
      dropArea.className += isCorrect ? ' drop-correct' : ' drop-wrong';
      dropArea.innerHTML = `<span class="drop-chip ${isCorrect ? 'chip-correct' : 'chip-wrong'}">${chosenAnswer || '—'}</span>`;
      if (!isCorrect) {
        const hint = document.createElement('div');
        hint.style.cssText = 'font-size: 12px; color: #6ee7b7; margin-top: 6px;';
        hint.textContent = `✓ ${pair.answer}`;
        dropArea.appendChild(hint);
      }
    } else {
      if (chosenAnswer) {
        // Show placed chip with ability to remove
        const chip = document.createElement('div');
        chip.className = 'drop-chip chip-placed';
        chip.textContent = chosenAnswer;
        chip.title = 'Click to remove';
        chip.onclick = () => removeDragAnswer(idx, pair.label, chosenAnswer, q, container);
        dropArea.appendChild(chip);
      } else {
        dropArea.innerHTML = '<span class="drop-placeholder">Drop here</span>';
        
        // Drag over / drop events
        dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('drag-over'); });
        dropArea.addEventListener('dragleave', () => dropArea.classList.remove('drag-over'));
        dropArea.addEventListener('drop', e => {
          e.preventDefault();
          dropArea.classList.remove('drag-over');
          const choice = e.dataTransfer.getData('text/plain');
          placeDragAnswer(idx, pair.label, choice, q, container);
        });
      }
    }
    
    zone.appendChild(labelBadge);
    zone.appendChild(stmtEl);
    zone.appendChild(dropArea);
    zones.appendChild(zone);
  });

  wrapper.appendChild(bank);
  wrapper.appendChild(zones);
  container.appendChild(wrapper);
}

function createDragChip(choice, idx, q) {
  const chip = document.createElement('div');
  chip.className = 'drag-chip';
  chip.textContent = choice;
  chip.draggable = true;
  chip.addEventListener('dragstart', e => {
    e.dataTransfer.setData('text/plain', choice);
    chip.classList.add('dragging');
  });
  chip.addEventListener('dragend', () => chip.classList.remove('dragging'));
  // Also support click-to-select on touch/mobile
  chip.onclick = () => {
    document.querySelectorAll('.drag-chip').forEach(c => c.classList.remove('chip-active'));
    chip.classList.toggle('chip-active');
    // If a zone is already selected, place it there
    const activeZone = document.querySelector('.drop-placeholder.zone-active');
    if (activeZone) {
      const label = activeZone.closest('.drag-drop-area').dataset.label;
      placeDragAnswer(idx, label, choice, q, document.getElementById('options-list'));
    }
  };
  return chip;
}

function placeDragAnswer(idx, pairLabel, choice, q, container) {
  if (!matchingAnswers[idx]) matchingAnswers[idx] = {};
  matchingAnswers[idx][pairLabel] = choice;
  // Re-render to update UI
  container.innerHTML = '';
  renderDragDrop(idx, q, container, false, matchingAnswers[idx]);
  // Update check button
  const answered = Object.values(matchingAnswers[idx]).filter(v => v).length;
  document.getElementById('check-btn').disabled = answered === 0;
}

function removeDragAnswer(idx, pairLabel, choice, q, container) {
  if (matchingAnswers[idx]) delete matchingAnswers[idx][pairLabel];
  container.innerHTML = '';
  renderDragDrop(idx, q, container, false, matchingAnswers[idx] || {});
  const answered = Object.values(matchingAnswers[idx] || {}).filter(v => v).length;
  document.getElementById('check-btn').disabled = answered === 0;
}

// Map of question number -> underlined term for "evaluate underlined text" questions
const UNDERLINE_MAP = {
  3: 'UNION keyword', 9: 'key', 19: 'denormalized', 24: 'relational database management system',
  25: 'UNION keyword', 29: 'Views', 31: 'Truncate', 39: 'UPDATE', 44: 'CREATE TABLE',
  84: 'Views', 99: 'unique record', 113: 'can be used to ensure referential integrity',
  116: 'indexing', 127: 'FROM keyword', 160: 'ALLOW SELECT', 172: 'ALTER', 190: 'Nine rows'
};

// Questions where options are image-based (can't be extracted from PDF)
const IMAGE_OPTION_QS = new Set([7, 20, 62, 69, 83, 112, 119, 133, 164, 178, 180, 194]);

function formatText(text, qNum) {
  let escaped = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
  
  // For "evaluate underlined text" questions, format the structure nicely
  if (UNDERLINE_MAP[qNum]) {
    const underlinedTerm = UNDERLINE_MAP[qNum];
    const instrIdx = escaped.indexOf('Instructions:');
    if (instrIdx !== -1) {
      const mainStatement = escaped.substring(0, instrIdx).trim();
      const instructions = escaped.substring(instrIdx).trim();
      
      const escapedTerm = underlinedTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const termRegex = new RegExp('(' + escapedTerm.replace(/\s+/g, '\\s+') + ')', 'i');
      const highlightedStatement = mainStatement.replace(termRegex, '<u class="eval-underline">$1</u>');
      
      escaped = `${highlightedStatement}<div class="eval-instructions">${instructions}</div>`;
    } else {
      const termRegex = new RegExp('(' + underlinedTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&').replace(/\s+/g, '\\s+') + ')', 'gi');
      escaped = escaped.replace(termRegex, '<u class="eval-underline">$1</u>');
    }
  }

  // Convert newlines: lines starting with spaces/tabs become <code> blocks,
  // others become normal line breaks
  const lines = escaped.split('\n');
  let html = '';
  let inCode = false;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const isCodeLine = /^[ \t]{2,}/.test(line) || /^\s*(SELECT|INSERT|UPDATE|DELETE|CREATE|DROP|ALTER|REVOKE|REMOVE|GRANT|FROM|WHERE|ORDER|PRIMARY|FOREIGN|LEFT|RIGHT|INNER|OUTER)\b/.test(line.trim());
    const isBlank = line.trim() === '';

    if (isCodeLine && !inCode) {
      html += '<pre class="q-code-block">';
      inCode = true;
    } else if (!isCodeLine && !isBlank && inCode) {
      html += '</pre>';
      inCode = false;
    } else if (isBlank && inCode) {
      html += '\n';
      continue;
    }

    if (inCode) {
      html += line + '\n';
    } else if (isBlank) {
      html += '<br>';
    } else {
      // Highlight SQL keywords inline
      const highlighted = line.replace(/\b(SELECT|INSERT|UPDATE|DELETE|CREATE|DROP|ALTER|FROM|WHERE|JOIN|LEFT|RIGHT|INNER|OUTER|GROUP BY|ORDER BY|HAVING|UNION|INTERSECT|EXCEPT|NULL|NOT NULL|PRIMARY KEY|FOREIGN KEY|REVOKE|GRANT|TRUNCATE)\b/g,
        kw => `<code>${kw}</code>`);
      html += highlighted + '<br>';
    }
  }

  if (inCode) html += '</pre>';

  // Clean up leading/trailing breaks
  html = html.replace(/^(<br>)+/, '').replace(/(<br>)+$/, '');

  return html;
}

function toggleOption(idx, text, btn, isMulti) {
  if (!answers[idx]) answers[idx] = [];
  
  if (!isMulti) {
    // Single select - deselect all others
    answers[idx] = [text];
    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  } else {
    // Multi select - toggle
    const pos = answers[idx].indexOf(text);
    if (pos === -1) {
      answers[idx].push(text);
      btn.classList.add('selected');
    } else {
      answers[idx].splice(pos, 1);
      btn.classList.remove('selected');
    }
  }
  
  document.getElementById('check-btn').disabled = answers[idx].length === 0;
}

function checkAnswer() {
  const idx = current;
  const q = QUESTIONS[idx];
  
  let isCorrect;
  
  if (q.type === 'Matching' && q.pairs) {
    const saved = matchingAnswers[idx] || {};
    // Check each pair
    isCorrect = q.pairs.every(pair => {
      const chosen = (saved[pair.label] || '').toLowerCase().trim();
      const correct = pair.answer.toLowerCase().trim();
      return chosen === correct;
    });
    // Make sure all pairs are answered
    if (Object.keys(saved).length < q.pairs.length) {
      isCorrect = false;
    }
  } else {
    const selected = answers[idx] || [];
    if (selected.length === 0) return;
    
    const correctSet = new Set(q.correct.map(c => c.toLowerCase().trim()));
    const selectedSet = new Set(selected.map(s => s.toLowerCase().trim()));
    
    if (q.is_multi) {
      isCorrect = correctSet.size === selectedSet.size &&
        [...correctSet].every(c => selectedSet.has(c));
    } else {
      isCorrect = selectedSet.size === 1 && correctSet.has([...selectedSet][0]);
    }
  }
  
  checked[idx] = isCorrect;
  renderQuestion(idx);
}

function navigate(dir) {
  const newIdx = current + dir;
  if (newIdx >= 0 && newIdx < QUESTIONS.length) {
    current = newIdx;
    renderQuestion(current);
    window.scrollTo({top: 0, behavior: 'smooth'});
  }
}

function updateFinishBtn() {
  // Show finish button in footer if all answered
  const totalAnswered = Object.keys(checked).length;
  // Could add a finish button somewhere
}

function showResults() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('results-screen').style.display = 'block';
  
  let correctNums = [], wrongNums = [], skippedNums = [];
  
  QUESTIONS.forEach((q, i) => {
    if (checked.hasOwnProperty(i)) {
      if (checked[i]) correctNums.push(i);
      else wrongNums.push(i);
    } else {
      skippedNums.push(i);
    }
  });
  
  const total = QUESTIONS.length;
  const pct = Math.round(correctNums.length / total * 100);
  
  document.getElementById('result-score').textContent = `${pct}%`;
  document.getElementById('stat-correct').textContent = correctNums.length;
  document.getElementById('stat-wrong').textContent = wrongNums.length;
  document.getElementById('stat-skipped').textContent = skippedNums.length;
  document.getElementById('stat-total').textContent = total;
  
  // Summaries
  document.getElementById('correct-nums-summary').textContent = 
    `— Qs: ${correctNums.map(i=>QUESTIONS[i].num).join(', ')}`;
  document.getElementById('wrong-nums-summary').textContent = 
    `— Qs: ${[...wrongNums,...skippedNums].map(i=>QUESTIONS[i].num).join(', ')}`;
  
  // Build correct list
  buildReviewList('correct-list', correctNums, 'correct');
  // Build wrong list
  buildReviewList('wrong-list', [...wrongNums, ...skippedNums], 'wrong');
  
  window.scrollTo({top:0, behavior:'smooth'});
}

function buildReviewList(containerId, indices, type) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  
  if (indices.length === 0) {
    container.innerHTML = '<div style="color:var(--text3);font-size:14px;padding:16px;text-align:center;">None</div>';
    return;
  }
  
  indices.forEach(idx => {
    const q = QUESTIONS[idx];
    const item = document.createElement('div');
    item.className = `review-item ri-${type === 'correct' ? (checked[idx] ? 'correct' : 'wrong') : 'wrong'}`;
    
    const statusText = checked[idx] === true ? 'Correct' : (checked[idx] === false ? 'Wrong' : 'Skipped');
    const statusClass = checked[idx] === true ? 'correct' : (checked[idx] === false ? 'wrong' : 'skipped');
    
    const selectedAnswers = answers[idx] || [];
    
    item.innerHTML = `
      <div class="ri-header">
        <span class="ri-num">Q${q.num}</span>
        <span class="ri-status ${statusClass}">${statusText}</span>
        <span class="ri-expand-hint">Click to expand</span>
      </div>
      <div class="ri-question">${q.question.substring(0, 180)}${q.question.length > 180 ? '...' : ''}</div>
      <div class="ri-answers">
        ${selectedAnswers.length > 0 ? selectedAnswers.map(a => {
          const isCorrectAns = q.correct.some(c => c.toLowerCase().trim() === a.toLowerCase().trim());
          return `<div class="ri-answer-row ${isCorrectAns ? 'your-correct' : 'your-ans'}">
            ${isCorrectAns ? '✓' : '✗'} Your answer: ${a}
          </div>`;
        }).join('') : '<div class="ri-answer-row" style="color:var(--yellow)">— Not answered</div>'}
        ${q.correct.map(c => {
          const wasSelected = selectedAnswers.some(a => a.toLowerCase().trim() === c.toLowerCase().trim());
          return wasSelected ? '' : `<div class="ri-answer-row correct-ans">✓ Correct: ${c}</div>`;
        }).join('')}
      </div>
    `;
    
    item.onclick = () => item.classList.toggle('expanded');
    container.appendChild(item);
  });
}

  current = 0;
  answers = {};
